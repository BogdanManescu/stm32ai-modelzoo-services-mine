general:
  project_name: states_detection_pt
  saved_models_dir: saved_models
  seed: 42
  gpu_memory_limit: 10
  display_figures: False

operation_mode: training

dataset:
  dataset_name: "custom"
  num_classes: 129
  training_path: ./datasets/states_dataset/train
  validation_path: ./datasets/states_dataset/val
  test_path: ./datasets/states_dataset/test
  workers: 2
  worker_seeding: 'all'
  pin_mem: true
  no_prefetcher: true

preprocessing:
  rescaling:
    scale: 1
    offset: 0
  resizing:
    interpolation: bilinear
    aspect_ratio: fit
  color_mode: rgb
  normalization:
    mean: [0, 0, 0]
    std: [1, 1, 1]

data_augmentation:
  no_aug: True
  crop_range: [1.0, 1.0]
  ratio: [1.0, 1.0]
  horizontal_flip: 0
  vertical_flip: 0
  hflip: 0
  vflip: 0
  color_jitter: 0
  reprob: 0
  mixup: 0
  cutmix: 0
  smoothing: 0

model:
  framework: 'torch'
  model_name: 'states_cnn_pt'
  pretrained: False
  pretrained_dataset: null
  input_shape: [3, 16, 128]

training:
  trainer_name: ic_trainer
  epochs: 50
  batch_size: 32
  validation_batch_size: 32

  optimizer:
    opt: 'adam'
    opt_eps: null
    opt_betas: null
    momentum: 0.9
    weight_decay: 0.0001
    clip_grad: null
    clip_mode: 'norm'
    layer_decay: null

  lr_scheduler:
    sched: 'cosine'
    sched_on_updates: False
    lr: null
    lr_base: 0.001
    lr_base_size: 32
    lr_base_scale: ''
    lr_noise: null
    lr_noise_pct: 0.67
    lr_noise_std: 1.0
    lr_cycle_mul: 1.0
    lr_cycle_decay: 0.5
    lr_cycle_limit: 1
    lr_k_decay: 1.0
    warmup_lr: 0.00001
    min_lr: 0.00001
    epoch_repeats: 0
    start_epoch: 0
    decay_milestones: [90, 180, 270]
    decay_epochs: 90
    warmup_epochs: 5
    warmup_prefix: False
    cooldown_epochs: 0
    patience_epochs: 10
    decay_rate: 0.1

  log_interval: 10
  eval_metric: "top1"
  amp: false

mlflow:
  uri: ./pt/src/experiments_outputs/mlruns

hydra:
  run:
    dir: ./pt/src/experiments_outputs/${now:%Y_%m_%d_%H_%M_%S}
